<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1122 793" width="1122" height="793">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .title { font-size: 24px; font-weight: 700; fill: #1a1a2e; }
      .subtitle { font-size: 13px; font-weight: 600; fill: #4a4a6a; }
      .box-label { font-size: 14px; font-weight: 700; fill: #fff; }
      .pin-label { font-size: 12px; font-weight: 600; fill: #fff; }
      .pin-num { font-size: 10px; font-weight: 400; fill: rgba(255,255,255,0.7); }
      .section-title { font-size: 14px; font-weight: 700; fill: #1a1a2e; }
      .note-text { font-size: 10.5px; fill: #333; }
      .note-bold { font-size: 10.5px; fill: #333; font-weight: 700; }
      .footer-text { font-size: 9px; fill: #999; }
      .th { font-size: 11px; font-weight: 700; fill: #fff; }
      .td { font-size: 11px; font-weight: 600; fill: #2d2d44; }
    </style>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3498db"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e67e22"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e74c3c"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1122" height="793" fill="#fafafa"/>
  <rect x="16" y="16" width="1090" height="761" fill="none" stroke="#ccc" stroke-width="1.5" rx="8"/>

  <!-- ============ HEADER ============ -->
  <text x="561" y="50" text-anchor="middle" class="title">ACTIVE WIND WALL — WIRING REFERENCE</text>
  <text x="561" y="68" text-anchor="middle" class="subtitle">Raspberry Pi 5 → Pico SPI Bus · Daisy-Chain Topology · Page 1 of 2</text>
  <line x1="40" y1="78" x2="1082" y2="78" stroke="#ddd" stroke-width="1"/>

  <!-- ============ LEFT: WIRING DIAGRAM ============ -->
  <text x="50" y="100" class="section-title">SPI BUS + POWER WIRING (6 wires daisy-chained to all 4 Picos)</text>

  <!-- ===== RASPBERRY PI BOX ===== -->
  <rect x="50" y="115" width="230" height="260" rx="10" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <rect x="50" y="115" width="230" height="34" rx="10" fill="#34495e"/>
  <rect x="50" y="139" width="230" height="10" fill="#34495e"/>
  <text x="165" y="138" text-anchor="middle" class="box-label" font-size="15">RASPBERRY PI 5</text>

  <!-- Pi pins - white text on dark background -->
  <text x="68" y="177" class="pin-label">GPIO 10  (MOSI)</text>
  <text x="254" y="177" text-anchor="end" class="pin-num">Pin 19</text>
  <circle cx="280" cy="173" r="6" fill="#3498db" stroke="#fff" stroke-width="1"/>

  <text x="68" y="207" class="pin-label">GPIO 11  (SCLK)</text>
  <text x="254" y="207" text-anchor="end" class="pin-num">Pin 23</text>
  <circle cx="280" cy="203" r="6" fill="#27ae60" stroke="#fff" stroke-width="1"/>

  <text x="68" y="237" class="pin-label">GPIO 8   (CE0 / CS)</text>
  <text x="254" y="237" text-anchor="end" class="pin-num">Pin 24</text>
  <circle cx="280" cy="233" r="6" fill="#e67e22" stroke="#fff" stroke-width="1"/>

  <text x="68" y="267" class="pin-label">GPIO 22  (SYNC)</text>
  <text x="254" y="267" text-anchor="end" class="pin-num">Pin 15</text>
  <circle cx="280" cy="263" r="6" fill="#e74c3c" stroke="#fff" stroke-width="1"/>

  <text x="68" y="302" class="pin-label">GND</text>
  <text x="254" y="302" text-anchor="end" class="pin-num">Pin 39</text>
  <circle cx="280" cy="298" r="6" fill="#555" stroke="#fff" stroke-width="1"/>

  <text x="68" y="337" class="pin-label">3.3V</text>
  <text x="254" y="337" text-anchor="end" class="pin-num">Pin 1</text>
  <circle cx="280" cy="333" r="6" fill="#9b59b6" stroke="#fff" stroke-width="1"/>

  <!-- ===== PICO BOXES ===== -->
  <!-- Pico 0 -->
  <rect x="440" y="112" width="190" height="115" rx="8" fill="#2980b9" stroke="#1f6fa3" stroke-width="1.5"/>
  <text x="535" y="134" text-anchor="middle" class="box-label">PICO 0  (PICO_ID=0)</text>
  <text x="455" y="155" font-size="11" font-weight="600" fill="#fff">GPIO 16 ← MOSI</text>
  <text x="455" y="172" font-size="11" font-weight="600" fill="#fff">GPIO 18 ← SCK</text>
  <text x="455" y="189" font-size="11" font-weight="600" fill="#fff">GPIO 17 ← CS</text>
  <text x="455" y="206" font-size="11" font-weight="600" fill="#fff">GPIO 22 ← SYNC</text>
  <text x="455" y="221" font-size="10" fill="rgba(255,255,255,0.8)">GND · 3V3 (power)</text>

  <!-- Pico 1 -->
  <rect x="440" y="240" width="190" height="115" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="535" y="262" text-anchor="middle" class="box-label">PICO 1  (PICO_ID=1)</text>
  <text x="455" y="283" font-size="11" font-weight="600" fill="#fff">GPIO 16 ← MOSI</text>
  <text x="455" y="300" font-size="11" font-weight="600" fill="#fff">GPIO 18 ← SCK</text>
  <text x="455" y="317" font-size="11" font-weight="600" fill="#fff">GPIO 17 ← CS</text>
  <text x="455" y="334" font-size="11" font-weight="600" fill="#fff">GPIO 22 ← SYNC</text>
  <text x="455" y="349" font-size="10" fill="rgba(255,255,255,0.8)">GND · 3V3 (power)</text>

  <!-- Pico 2 -->
  <rect x="440" y="368" width="190" height="115" rx="8" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="535" y="390" text-anchor="middle" class="box-label">PICO 2  (PICO_ID=2)</text>
  <text x="455" y="411" font-size="11" font-weight="600" fill="#fff">GPIO 16 ← MOSI</text>
  <text x="455" y="428" font-size="11" font-weight="600" fill="#fff">GPIO 18 ← SCK</text>
  <text x="455" y="445" font-size="11" font-weight="600" fill="#fff">GPIO 17 ← CS</text>
  <text x="455" y="462" font-size="11" font-weight="600" fill="#fff">GPIO 22 ← SYNC</text>
  <text x="455" y="477" font-size="10" fill="rgba(255,255,255,0.8)">GND · 3V3 (power)</text>

  <!-- Pico 3 -->
  <rect x="440" y="496" width="190" height="115" rx="8" fill="#c0392b" stroke="#a93226" stroke-width="1.5"/>
  <text x="535" y="518" text-anchor="middle" class="box-label">PICO 3  (PICO_ID=3)</text>
  <text x="455" y="539" font-size="11" font-weight="600" fill="#fff">GPIO 16 ← MOSI</text>
  <text x="455" y="556" font-size="11" font-weight="600" fill="#fff">GPIO 18 ← SCK</text>
  <text x="455" y="573" font-size="11" font-weight="600" fill="#fff">GPIO 17 ← CS</text>
  <text x="455" y="590" font-size="11" font-weight="600" fill="#fff">GPIO 22 ← SYNC</text>
  <text x="455" y="605" font-size="10" fill="rgba(255,255,255,0.8)">GND · 3V3 (power)</text>

  <!-- ===== WIRES: Pi → Pico 0 ===== -->
  <line x1="286" y1="173" x2="438" y2="150" stroke="#3498db" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <line x1="286" y1="203" x2="438" y2="167" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <line x1="286" y1="233" x2="438" y2="184" stroke="#e67e22" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <line x1="286" y1="263" x2="438" y2="201" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <line x1="286" y1="298" x2="438" y2="218" stroke="#555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-gray)"/>

  <!-- ===== DAISY-CHAIN BUS (vertical bars) ===== -->
  <!-- Title ABOVE the bars, clearly outside -->
  <text x="680" y="105" font-size="12" font-weight="700" fill="#555" text-anchor="middle">DAISY-CHAIN BUS</text>
  <text x="680" y="118" font-size="10" font-weight="600" fill="#888" text-anchor="middle">(6 wires)</text>

  <!-- 6 vertical bars (no 3.3V — Pico regulates its own from VBUS) -->
  <rect x="648" y="130" width="8" height="490" rx="3" fill="#3498db" opacity="0.35"/>
  <rect x="662" y="130" width="8" height="490" rx="3" fill="#27ae60" opacity="0.35"/>
  <rect x="676" y="130" width="8" height="490" rx="3" fill="#e67e22" opacity="0.35"/>
  <rect x="690" y="130" width="8" height="490" rx="3" fill="#e74c3c" opacity="0.35"/>
  <rect x="704" y="130" width="8" height="490" rx="3" fill="#555" opacity="0.25"/>
  <rect x="718" y="130" width="8" height="490" rx="3" fill="#9b59b6" opacity="0.25"/>

  <!-- Bus labels - VERTICAL for readability, above bars -->
  <text x="655" y="128" font-size="9" font-weight="700" fill="#2980b9" text-anchor="end" transform="rotate(-90,655,128)">MOSI</text>
  <text x="669" y="128" font-size="9" font-weight="700" fill="#27ae60" text-anchor="end" transform="rotate(-90,669,128)">SCK</text>
  <text x="683" y="128" font-size="9" font-weight="700" fill="#e67e22" text-anchor="end" transform="rotate(-90,683,128)">CS</text>
  <text x="697" y="128" font-size="9" font-weight="700" fill="#e74c3c" text-anchor="end" transform="rotate(-90,697,128)">SYNC</text>
  <text x="711" y="128" font-size="9" font-weight="700" fill="#555" text-anchor="end" transform="rotate(-90,711,128)">GND</text>
  <text x="725" y="128" font-size="9" font-weight="700" fill="#9b59b6" text-anchor="end" transform="rotate(-90,725,128)">3V3</text>

  <!-- ============ RIGHT SIDE: PIN REFERENCE TABLE ============ -->
  <text x="775" y="100" class="section-title">PHYSICAL PIN REFERENCE</text>

  <!-- Table: x=775 to x=1070 -->
  <rect x="775" y="108" width="295" height="26" rx="5" fill="#2c3e50"/>
  <text x="800" y="126" class="th">Pi Pin</text>
  <text x="862" y="126" class="th">Pi GPIO</text>
  <text x="937" y="126" class="th">Signal</text>
  <text x="1020" y="126" class="th">Pico Pin</text>

  <!-- Row 1: MOSI -->
  <rect x="775" y="134" width="295" height="26" fill="#eaf2f8"/>
  <circle cx="788" cy="147" r="5" fill="#3498db"/>
  <text x="800" y="151" class="td">Pin 19</text>
  <text x="862" y="151" class="td">GPIO 10</text>
  <text x="937" y="151" class="td">MOSI</text>
  <text x="1020" y="151" class="td">GP 16</text>

  <!-- Row 2: SCLK -->
  <rect x="775" y="160" width="295" height="26" fill="#fff"/>
  <circle cx="788" cy="173" r="5" fill="#27ae60"/>
  <text x="800" y="177" class="td">Pin 23</text>
  <text x="862" y="177" class="td">GPIO 11</text>
  <text x="937" y="177" class="td">SCLK</text>
  <text x="1020" y="177" class="td">GP 18</text>

  <!-- Row 3: CS -->
  <rect x="775" y="186" width="295" height="26" fill="#eaf2f8"/>
  <circle cx="788" cy="199" r="5" fill="#e67e22"/>
  <text x="800" y="203" class="td">Pin 24</text>
  <text x="862" y="203" class="td">GPIO 8</text>
  <text x="937" y="203" class="td">CS</text>
  <text x="1020" y="203" class="td">GP 17</text>

  <!-- Row 4: SYNC -->
  <rect x="775" y="212" width="295" height="26" fill="#fff"/>
  <circle cx="788" cy="225" r="5" fill="#e74c3c"/>
  <text x="800" y="229" class="td">Pin 15</text>
  <text x="862" y="229" class="td">GPIO 22</text>
  <text x="937" y="229" class="td">SYNC</text>
  <text x="1020" y="229" class="td">GP 22</text>

  <!-- Row 5: GND -->
  <rect x="775" y="238" width="295" height="26" fill="#eaf2f8"/>
  <circle cx="788" cy="251" r="5" fill="#555"/>
  <text x="800" y="255" class="td">Pin 39</text>
  <text x="862" y="255" class="td">GND</text>
  <text x="937" y="255" class="td">Ground</text>
  <text x="1020" y="255" class="td">GND</text>

  <!-- Row 6: 3.3V -->
  <rect x="775" y="264" width="295" height="26" fill="#fff"/>
  <circle cx="788" cy="277" r="5" fill="#9b59b6"/>
  <text x="800" y="281" class="td">Pin 1</text>
  <text x="862" y="281" class="td">3.3V</text>
  <text x="937" y="281" class="td">Power</text>
  <text x="1020" y="281" class="td">3V3</text>

  <!-- Table border -->
  <rect x="775" y="108" width="295" height="184" rx="5" fill="none" stroke="#bbb" stroke-width="1.2"/>

  <!-- ============ POWER DISTRIBUTION ============ -->
  <text x="775" y="322" class="section-title">POWER DISTRIBUTION</text>

  <rect x="775" y="332" width="295" height="155" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>

  <!-- Pico power -->
  <text x="790" y="352" class="note-bold">Picos (control boards):</text>
  <text x="790" y="368" class="note-text">Powered from Pi 3.3V via daisy chain to</text>
  <text x="790" y="384" class="note-text">each Pico's 3V3 pin. Stable, shared rail.</text>

  <!-- Motor power -->
  <text x="790" y="408" class="note-bold">Motors / ESCs:</text>
  <text x="790" y="424" class="note-text">Powered INDEPENDENTLY (external battery/PSU).</text>
  <text x="790" y="440" class="note-text">NOT from Pi or Pico. Only the PWM signal wire</text>
  <text x="790" y="456" class="note-text">connects Pico GPIO → ESC signal input.</text>

  <!-- Daisy chain visual -->
  <rect x="790" y="348" width="0" height="0"/>

  <!-- ============ SPI PROTOCOL ============ -->
  <text x="775" y="510" class="section-title">SPI PROTOCOL</text>

  <rect x="775" y="520" width="295" height="115" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>

  <text x="790" y="540" class="note-bold">Bus Speed:</text>
  <text x="880" y="540" class="note-text">1 MHz</text>

  <text x="790" y="558" class="note-bold">Frame Size:</text>
  <text x="880" y="558" class="note-text">36 bytes (1 per motor)</text>

  <text x="790" y="576" class="note-bold">Byte Value:</text>
  <text x="880" y="576" class="note-text">0–255 → 1000–2000 μs PWM</text>

  <text x="790" y="594" class="note-bold">Mode:</text>
  <text x="880" y="594" class="note-text">Broadcast (all Picos hear all)</text>

  <text x="790" y="612" class="note-bold">SYNC Pulse:</text>
  <text x="880" y="612" class="note-text">10 μs rising edge, GPIO 22</text>

  <text x="790" y="630" class="note-bold">Safety:</text>
  <text x="880" y="630" class="note-text">200 ms timeout → motors idle</text>

  <!-- ============ BOTTOM NOTES ============ -->
  <rect x="40" y="655" width="1042" height="108" rx="6" fill="#fff8e1" stroke="#f0d060" stroke-width="1.2"/>
  <text x="60" y="678" class="section-title" fill="#b7950b">IMPORTANT NOTES</text>

  <text x="60" y="698" class="note-text">1. SPI is one-way: Pi sends, Picos receive. GPIO 19 (MISO) on Pico is configured but unused — do NOT connect it.</text>
  <text x="60" y="716" class="note-text">2. Each Pico must be flashed with the correct PICO_ID (0, 1, 2, or 3). It reads all 36 bytes but only uses its own 9-byte slice.</text>
  <text x="60" y="734" class="note-text">3. GND must be common across ALL boards. Without shared ground, SPI will fail.</text>
  <text x="60" y="752" class="note-text">4. GPIO 25 on each Pico = on-board LED. Blinks every 20 SYNC pulses (healthy). Fast blink = error. No external wiring needed.</text>

  <!-- Footer -->
  <text x="561" y="778" text-anchor="middle" class="footer-text">Active Wind Wall — ISM WiMi · Wiring Reference · Page 1 of 2 · Print at A4 Landscape</text>
</svg>